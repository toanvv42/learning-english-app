name: gitleaks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: go install github.com/gitleaks/gitleaks/v8@v8.30.0

      - name: Scan repository
        run: gitleaks detect --source . --redact --no-banner --exit-code 1
